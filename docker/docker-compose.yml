services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vc_platform}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-vc_platform}"]
      interval: 5s
      timeout: 5s
      retries: 10

  openbao:
    image: openbao/openbao:latest
    env_file:
      - ../.env
    cap_add:
      - IPC_LOCK
    environment:
      OPENBAO_DEV_ROOT_TOKEN_ID: ${OPENBAO_DEV_ROOT_TOKEN_ID:-root}
    ports:
      - "8200:8200"
    command: server -dev -dev-root-token-id=${OPENBAO_DEV_ROOT_TOKEN_ID:-root}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8200/v1/sys/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  openbao-init:
    image: openbao/openbao:latest
    env_file:
      - ../.env
    depends_on:
      openbao:
        condition: service_healthy
    environment:
      OPENBAO_ADDR: http://openbao:8200
      OPENBAO_TOKEN: ${OPENBAO_DEV_ROOT_TOKEN_ID:-root}
    volumes:
      - ./openbao/init.sh:/init.sh:ro
    entrypoint: ["/bin/sh", "/init.sh"]
    restart: "no"

volumes:
  postgres_data:
